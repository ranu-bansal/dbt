datasets:
  orders:
    path: data/raw/orders.csv
    type: raw
  customers:
    path: data/raw/customers.csv
    type: raw
  products:
    path: data/raw/products.csv
    type: raw
  order_items:
    path: data/raw/order_items.csv
    type: raw
